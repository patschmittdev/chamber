<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chamber is a desktop workspace for creating and running AI agents."
    />
    <link rel="icon" type="image/svg+xml" href="/assets/app.svg" />
    <title>Chamber</title>
    <script src="/appearance-bootstrap.js"></script>
    <style>
      :root {
        --chamber-first-paint-background: #ffffff;
        color-scheme: light;
      }

      :root.dark {
        --chamber-first-paint-background: #09090b;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--chamber-first-paint-background);
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
